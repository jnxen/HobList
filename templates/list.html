<!doctype html>
<html>
  <head>
    <title>Expenses</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --red: #e63946;
        --dark: #0d0d0d;
        --card: #161616;
        --muted: #555555;
        --white: #f5f5f5;
        --accent: #ffd60a;
        --border: #222222;
        --hover: #1e1e1e;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--dark);
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.025) 1px,
            transparent 1px
          );
        background-size: 60px 60px;
        padding: 3rem 1rem;
        color: var(--white);
      }

      .wrap {
        max-width: 580px;
        margin: 0 auto;
      }

      /* ── Top header row ── */
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.75rem;
      }

      .top h1 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 30px;
        font-weight: 400;
        letter-spacing: 0.08em;
        color: var(--white);
      }

      .top h1 span {
        color: var(--red);
      }

      .top a {
        font-family: "Bebas Neue", sans-serif;
        font-size: 15px;
        letter-spacing: 0.12em;
        color: var(--white);
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 0;
        padding: 7px 16px;
        background: var(--card);
        clip-path: polygon(
          0 0,
          calc(100% - 8px) 0,
          100% 8px,
          100% 100%,
          8px 100%,
          0 calc(100% - 8px)
        );
        transition:
          background 0.2s ease,
          color 0.2s ease;
      }

      .top a:hover {
        background: var(--red);
        border-color: var(--red);
      }

      /* ── Stat cards ── */
      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 1.5rem;
      }

      .stat {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 16px;
        transition: border-color 0.2s ease;
      }

      .stat:hover {
        border-color: #333;
      }

      .stat-label {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      .stat-value {
        font-family: "Bebas Neue", sans-serif;
        font-size: 26px;
        font-weight: 400;
        letter-spacing: 0.05em;
        color: var(--white);
      }

      /* Highlight the total value in red accent */
      .stat:last-child .stat-value {
        color: var(--red);
      }

      /* ── Expense list rows ── */
      .list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
        transition: border-color 0.2s ease;
      }

      .row:hover {
        border-color: #333;
      }

      .row-left {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .row-name {
        font-size: 14px;
        font-weight: 500;
        color: var(--white);
      }

      .row-meta {
        font-size: 12px;
        color: var(--muted);
      }

      .row-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .row-amount {
        font-family: "Bebas Neue", sans-serif;
        font-size: 16px;
        letter-spacing: 0.05em;
        color: var(--accent); /* Yellow — stands out as a value */
        min-width: 64px;
        text-align: right;
      }

      .divider {
        width: 1px;
        height: 16px;
        background: var(--border);
      }

      /* ── Action buttons ── */
      .btn-action {
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        font-weight: 500;
        padding: 5px 11px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        white-space: nowrap;
        transition:
          background 0.2s ease,
          color 0.2s ease,
          border-color 0.2s ease;
      }

      .btn-action:hover {
        background: var(--hover);
        color: var(--white);
        border-color: #444;
      }

      /* Danger — delete/clear button */
      .btn-action.danger:hover {
        background: rgba(230, 57, 70, 0.12);
        color: var(--red);
        border-color: var(--red);
      }

      /* ── Footer: clear all ── */
      .footer {
        display: flex;
        justify-content: flex-end;
        margin-top: 1.25rem;
      }

      .btn-clear-all {
        font-family: "Bebas Neue", sans-serif;
        font-size: 15px;
        letter-spacing: 0.12em;
        padding: 8px 18px;
        border: 1px solid var(--red);
        border-radius: 0;
        clip-path: polygon(
          0 0,
          calc(100% - 8px) 0,
          100% 8px,
          100% 100%,
          8px 100%,
          0 calc(100% - 8px)
        );
        background: transparent;
        color: var(--red);
        cursor: pointer;
        transition:
          background 0.2s ease,
          color 0.2s ease;
      }

      .btn-clear-all:hover {
        background: var(--red);
        color: var(--white);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <!-- Header -->
      <div class="top">
        <h1>Expense <span>List</span></h1>
        <a href="/add_items">+ Add Expense</a>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <div class="stat-label">Items</div>
          <div class="stat-value">{{ items | length }}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Total qty</div>
          <div class="stat-value">{{ items | sum(attribute='quantity') }}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Total</div>
          <div class="stat-value">₱{{ total }}</div>
        </div>
      </div>

      <!-- List -->
      <div class="list">
        {% for item in items %}
        <div class="row">
          <div class="row-left">
            <span class="row-name">{{ item.name }}</span>
            <span class="row-meta"
              >{{ item.brand }} &nbsp;·&nbsp; qty {{ item.quantity }}</span
            >
          </div>
          <div class="row-right">
            <span class="row-amount">₱{{ item.amount }}</span>
            <div class="divider"></div>
            <form action="/edit/{{ item['item_id'] }}">
              <button type="submit" class="btn-action">Edit</button>
            </form>
            <form action="/delete/{{ item['item_id'] }}" method="POST">
              <button type="submit" class="btn-action danger">Clear</button>
            </form>
          </div>
        </div>
        {% endfor %}
      </div>

      <!-- Footer -->
      <div class="footer">
        <form action="/clear" method="POST">
          <button type="submit" class="btn-clear-all">
            Clear All Expenses
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
