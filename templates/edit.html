<!doctype html>
<html>
  <head>
    <title>Edit Expense</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --red: #e63946;
        --dark: #0d0d0d;
        --card: #161616;
        --muted: #555555;
        --white: #f5f5f5;
        --accent: #ffd60a;
        --border: #222222;
        --hover: #1e1e1e;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--dark);
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.025) 1px,
            transparent 1px
          );
        background-size: 60px 60px;
        display: flex;
        justify-content: center;
        padding: 3rem 1rem;
        color: var(--white);
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2rem;
        width: 100%;
        max-width: 420px;
        box-shadow:
          0 0 0 1px var(--border),
          0 -2px 20px rgba(230, 57, 70, 0.08);
      }

      /* ── Header ── */
      .card-header {
        margin-bottom: 1.75rem;
      }

      h1 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 28px;
        font-weight: 400;
        letter-spacing: 0.08em;
        color: var(--white);
        margin-bottom: 0.2rem;
      }

      h1 span {
        color: var(--red);
      }

      .subtitle {
        font-size: 13px;
        color: var(--muted);
        font-weight: 300;
      }

      /* ── Fields ── */
      .field {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 1rem;
      }

      label {
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        padding: 10px 13px;
        font-size: 14px;
        font-family: "DM Sans", sans-serif;
        background: var(--hover);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--white);
        outline: none;
        transition: border-color 0.15s ease;
      }

      input::placeholder {
        color: #3a3a3a;
      }

      input:focus {
        border-color: var(--red);
      }

      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      /* ── Actions ── */
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 0.75rem;
      }

      /* Save — same clipped CTA as add expense & clear all */
      .btn-save {
        flex: 1;
        padding: 12px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 18px;
        letter-spacing: 0.15em;
        background: var(--red);
        color: var(--white);
        border: none;
        border-radius: 0;
        clip-path: polygon(
          0 0,
          calc(100% - 10px) 0,
          100% 10px,
          100% 100%,
          10px 100%,
          0 calc(100% - 10px)
        );
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition:
          background 0.2s ease,
          transform 0.15s ease;
      }

      .btn-save::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.1) 50%,
          transparent 100%
        );
        transform: translateX(-100%);
        transition: transform 0.45s ease;
      }

      .btn-save:hover::before {
        transform: translateX(100%);
      }

      .btn-save:hover {
        background: #c1121f;
        transform: translateY(-1px);
      }

      /* Cancel — muted ghost button */
      .btn-cancel {
        padding: 10px 18px;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 500;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        transition:
          background 0.2s ease,
          color 0.2s ease,
          border-color 0.2s ease;
      }

      .btn-cancel:hover {
        background: var(--hover);
        color: var(--white);
        border-color: #444;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <h1>Edit <span>Expense</span></h1>
        <p class="subtitle">Update the details for this item</p>
      </div>

      <form action="/update/{{ item['item_id'] }}" method="POST">
        <div class="field">
          <label for="name">Item name</label>
          <input
            type="text"
            id="name"
            name="name"
            value="{{ item.name }}"
            required
          />
        </div>
        <div class="field">
          <label for="brand">Brand</label>
          <input
            type="text"
            id="brand"
            name="brand"
            value="{{ item.brand }}"
            required
          />
        </div>
        <div class="row">
          <div class="field">
            <label for="price">Price (₱)</label>
            <input
              type="number"
              id="price"
              name="price"
              value="{{ item.price }}"
              required
            />
          </div>
          <div class="field">
            <label for="quantity">Quantity</label>
            <input
              type="number"
              id="quantity"
              name="quantity"
              value="{{ item.quantity }}"
              required
            />
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn-save">Save Changes →</button>
          <a href="/list" class="btn-cancel">Cancel</a>
        </div>
      </form>
    </div>
  </body>
</html>
