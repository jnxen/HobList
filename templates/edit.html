<!doctype html>
<html>
  <head>
    <title>Edit Expense</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --red: #e63946;
        --dark: #0d0d0d;
        --card: #161616;
        --muted: #555555;
        --white: #f5f5f5;
        --accent: #ffd60a;
        --border: #222222;
        --hover: #1e1e1e;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--dark);
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.025) 1px,
            transparent 1px
          );
        background-size: 60px 60px;
        display: flex;
        justify-content: center;
        padding: 3rem 1rem;
        color: var(--white);
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2rem;
        width: 100%;
        max-width: 420px;
        box-shadow:
          0 0 0 1px var(--border),
          0 -2px 20px rgba(230, 57, 70, 0.08);
      }

      .card-header {
        margin-bottom: 1.75rem;
      }

      h1 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 28px;
        font-weight: 400;
        letter-spacing: 0.08em;
        color: var(--white);
        margin-bottom: 0.2rem;
      }

      h1 span {
        color: var(--red);
      }

      .subtitle {
        font-size: 13px;
        color: var(--muted);
        font-weight: 300;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 1rem;
      }

      label {
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      /* Readonly display field */
      .field-readonly {
        width: 100%;
        padding: 10px 13px;
        font-size: 14px;
        font-family: "DM Sans", sans-serif;
        background: #131313;
        border: 1px solid #1a1a1a;
        border-radius: 8px;
        color: #666;
        cursor: not-allowed;
      }

      input {
        width: 100%;
        padding: 10px 13px;
        font-size: 14px;
        font-family: "DM Sans", sans-serif;
        background: var(--hover);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--white);
        outline: none;
        transition: border-color 0.15s ease;
      }

      input::placeholder {
        color: #3a3a3a;
      }
      input:focus {
        border-color: var(--red);
      }

      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
      }

      input:-webkit-autofill,
      input:-webkit-autofill:hover,
      input:-webkit-autofill:focus {
        -webkit-text-fill-color: var(--white);
        -webkit-box-shadow: 0 0 0px 1000px var(--hover) inset;
        transition: background-color 5000s ease-in-out 0s;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      /* Stepper */
      .stepper {
        display: flex;
        align-items: center;
        background: var(--hover);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        height: 40px;
      }

      .step-btn {
        width: 40px;
        height: 40px;
        background: transparent;
        border: none;
        color: var(--muted);
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.15s,
          color 0.15s;
        flex-shrink: 0;
      }

      .step-btn:hover {
        background: #2a2a2a;
        color: var(--white);
      }

      .step-val {
        flex: 1;
        text-align: center;
        font-size: 15px;
        font-weight: 500;
        color: var(--white);
        user-select: none;
      }

      /* Actions */
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 0.75rem;
      }

      .btn-save {
        flex: 1;
        padding: 12px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 18px;
        letter-spacing: 0.15em;
        background: var(--red);
        color: var(--white);
        border: none;
        border-radius: 0;
        clip-path: polygon(
          0 0,
          calc(100% - 10px) 0,
          100% 10px,
          100% 100%,
          10px 100%,
          0 calc(100% - 10px)
        );
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition:
          background 0.2s ease,
          transform 0.15s ease;
      }

      .btn-save::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.1) 50%,
          transparent 100%
        );
        transform: translateX(-100%);
        transition: transform 0.45s ease;
      }

      .btn-save:hover::before {
        transform: translateX(100%);
      }
      .btn-save:hover {
        background: #c1121f;
        transform: translateY(-1px);
      }

      .btn-cancel {
        padding: 10px 18px;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 500;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        transition:
          background 0.2s ease,
          color 0.2s ease,
          border-color 0.2s ease;
      }

      .btn-cancel:hover {
        background: var(--hover);
        color: var(--white);
        border-color: #444;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <h1>Edit <span>Expense</span></h1>
        <p class="subtitle">Update the quantity for this item</p>
      </div>

      <form action="/update/{{ item['item_id'] }}" method="POST">
        <div class="field">
          <label>Item name</label>
          <div class="field-readonly">{{ item.name }}</div>
        </div>

        <div class="field">
          <label>Brand</label>
          <div class="field-readonly">{{ item.brand }}</div>
        </div>
        <div class="field">
          <label>Seller</label>
          <div class="field-readonly">{{ item.seller }}</div>
        </div>
        <div>
          <div class="field">
            <label>Estimated Time of Arrival</label>
            <input type="date" name="ETA" value="{{ item.ETA }}" required />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Price (₱)</label>
            <input
              type="number"
              name="price"
              value="{{ item.price }}"
              step="0.01"
              required
            />
          </div>
          <div class="field">
            <label>Quantity</label>
            <div class="stepper">
              <button class="step-btn" id="minus" type="button">−</button>
              <span class="step-val" id="qty">0</span>
              <button class="step-btn" id="plus" type="button">+</button>
            </div>
            <input type="hidden" name="quantity" id="qtyVal" value="0" />
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn-save">Save Changes →</button>
          <a href="/list" class="btn-cancel">Cancel</a>
        </div>
      </form>
    </div>

    <script>
      const qtyDisplay = document.getElementById("qty");
      const qtyInput = document.getElementById("qtyVal");

      document.getElementById("plus").onclick = function () {
        let current = parseInt(qtyDisplay.textContent);
        current++;
        qtyDisplay.textContent = current;
        qtyInput.value = current;
      };

      document.getElementById("minus").onclick = function () {
        let current = parseInt(qtyDisplay.textContent);
        current--;
        qtyDisplay.textContent = current;
        qtyInput.value = current;
      };
    </script>
  </body>
</html>
