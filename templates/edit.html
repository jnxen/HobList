<!doctype html>
<html>
  <head>
    <title>Edit Expense</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f3;
        display: flex;
        justify-content: center;
        padding: 3rem 1rem;
        color: #1a1a1a;
      }

      .card {
        background: #fff;
        border: 1px solid #e5e5e3;
        border-radius: 12px;
        padding: 2rem;
        width: 100%;
        max-width: 420px;
      }

      h1 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 0.2rem;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 1.75rem;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 1rem;
      }
      label {
        font-size: 13px;
        font-weight: 500;
        color: #555;
      }

      input {
        width: 100%;
        padding: 9px 12px;
        font-size: 14px;
        border: 1px solid #ddd;
        border-radius: 8px;
        outline: none;
        transition: border-color 0.15s;
      }
      input:focus {
        border-color: #888;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 0.75rem;
      }

      .btn-save {
        flex: 1;
        padding: 10px;
        font-size: 14px;
        font-weight: 500;
        background: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      .btn-save:hover {
        background: #333;
      }

      .btn-cancel {
        padding: 10px 16px;
        font-size: 14px;
        border-radius: 8px;
        border: 1px solid #ddd;
        background: transparent;
        color: #888;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }
      .btn-cancel:hover {
        background: #f5f5f3;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Edit expense</h1>
      <p class="subtitle">Update the details for this item</p>

      <form action="/update/{{ item['item_id'] }}" method="POST">
        <div class="field">
          <label for="name">Item name</label>
          <input
            type="text"
            id="name"
            name="name"
            value="{{ item.name }}"
            required
          />
        </div>
        <div class="field">
          <label for="brand">Brand</label>
          <input
            type="text"
            id="brand"
            name="brand"
            value="{{ item.brand }}"
            required
          />
        </div>
        <div class="row">
          <div class="field">
            <label for="price">Price (₱)</label>
            <input
              type="number"
              id="price"
              name="price"
              value="{{ item.price }}"
              required
            />
          </div>
          <div class="field">
            <label for="quantity">Quantity</label>
            <input
              type="number"
              id="quantity"
              name="quantity"
              value="{{ item.quantity }}"
              required
            />
          </div>
        </div>
        <div class="actions">
          <button type="submit" class="btn-save">Save changes</button>
          <a href="/list" class="btn-cancel">Cancel</a>
        </div>
      </form>
    </div>
  </body>
</html>
