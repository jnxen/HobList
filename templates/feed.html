{% extends "base.html" %} {% block content %}

<h1>Diecast Feed</h1>

{% for item in items %}
<div style="margin-bottom: 20px">
  {% if item[5] %}
  <img src="{{ item[5] }}" width="200" />
  {% endif %}

  <h3>{{ item[0] }}</h3>
  <p>{{ item[2] }} | {{ item[3] }}</p>
  <a href="{{ item[1] }}" target="_blank">View</a>
</div>
{% endfor %} {% endblock %}
