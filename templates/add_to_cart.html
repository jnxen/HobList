<!doctype html>
<html>
  <head>
    <title>Add Expense</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f3;
        display: flex;
        justify-content: center;
        padding: 3rem 1rem;
        color: #1a1a1a;
      }

      .card {
        background: #fff;
        border: 1px solid #e5e5e3;
        border-radius: 12px;
        padding: 2rem;
        width: 100%;
        max-width: 420px;
      }

      h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 1.75rem;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 1rem;
      }
      label {
        font-size: 13px;
        font-weight: 500;
        color: #555;
      }

      input {
        width: 100%;
        padding: 9px 12px;
        font-size: 14px;
        border: 1px solid #ddd;
        border-radius: 8px;
        outline: none;
        transition: border-color 0.15s;
      }
      input:focus {
        border-color: #888;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      button {
        width: 100%;
        margin-top: 0.5rem;
        padding: 10px;
        font-size: 15px;
        font-weight: 500;
        background: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      button:hover {
        background: #333;
      }

      .footer {
        text-align: center;
        margin-top: 1.25rem;
        font-size: 13px;
        color: #888;
      }
      .footer a {
        color: #1a1a1a;
        text-underline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Add expense</h1>
      <p class="subtitle">Track a new item to your expense list</p>

      <form action="/add" method="POST">
        <div class="field">
          <label for="name">Item name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="e.g. Coffee"
            required
          />
        </div>
        <div class="field">
          <label for="brand">Brand</label>
          <input
            type="text"
            id="brand"
            name="brand"
            placeholder="e.g. Starbucks"
            required
          />
        </div>
        <div class="row">
          <div class="field">
            <label for="price">Price (₱)</label>
            <input
              type="number"
              id="price"
              name="price"
              placeholder="0.00"
              required
            />
          </div>
          <div class="field">
            <label for="quantity">Quantity</label>
            <input
              type="number"
              id="quantity"
              name="quantity"
              placeholder="1"
              required
            />
          </div>
        </div>
        <button type="submit">Add expense</button>
      </form>

      <div class="footer">
        <a href="/list">View all expenses →</a>
      </div>
    </div>
  </body>
</html>
